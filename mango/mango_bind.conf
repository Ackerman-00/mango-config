# ─── FOCUS ────────────────────────────────────────────────────────────
bind=SUPER,Right,focusdir,right
bind=SUPER,Left,focusdir,left
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev

# ─── TAG SWITCHING ────────────────────────────────────────────────────
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER,0,view,0
bind=SUPER+ALT,Right,viewtoright
bind=SUPER+ALT,Left,viewtoleft

# ─── MOVE TO TAG ──────────────────────────────────────────────────────
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9
bind=SUPER+SHIFT,0,tag,0

# ─── SCROLL ───────────────────────────────────────────────────────────
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# ─── MOUSE ────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ─── DWINDLE ──────────────────────────────────────────────────────────
bind=SUPER+SHIFT,h,dwindle_split_horizontal
bind=SUPER+SHIFT,v,dwindle_split_vertical

# ─── AUDIO ────────────────────────────────────────────────────────────
bind=NONE,F5,spawn_shell,caelestia-shell ipc call audio set 5%-
bind=NONE,F6,spawn_shell,caelestia-shell ipc call audio set 5%+
bind=NONE,XF86AudioRaiseVolume,spawn_shell,caelestia-shell ipc call audio set 5%+
bind=NONE,XF86AudioLowerVolume,spawn_shell,caelestia-shell ipc call audio set 5%-
bind=NONE,XF86AudioMute,spawn_shell,caelestia-shell ipc call audio mute
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# ─── BRIGHTNESS ───────────────────────────────────────────────────────
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-

# ─── SCREENSHOTS ──────────────────────────────────────────────────────
bind=SUPER+SHIFT,s,spawn,/home/ackerman/.config/mango/scripts/screenshot.sh region
bind=NONE,Print,spawn,/home/ackerman/.config/mango/scripts/screenshot.sh full
