# ══════════════════════════════════════════════════════════════════════
#  MangoWM Window Rules
# ══════════════════════════════════════════════════════════════════════

# ─── OPACITY & BLUR ───────────────────────────────────────────────────────
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:nemo

windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:brave-browser
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:zen.*
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:blender

windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:firefox
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:chromium
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:google-chrome

windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:vlc
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:mpv
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:celluloid

windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:steam
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:steam_app.*
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:heroic*
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:lutris
windowrule=noblur:1,focused_opacity:1,unfocused_opacity:1,appid:faugus-launcher

windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:eog
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:org.gnome.Loupe
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:gimp
windowrule=focused_opacity:0.90,unfocused_opacity:0.87,appid:inkscape

# ─── PIP ──────────────────────────────────────────────────────────────────
windowrule=isfloating:1,isglobal:1,width:480,height:270,offsetx:90,offsety:90,title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# ─── FLOATING ─────────────────────────────────────────────────────────────
windowrule=isfloating:1,appid:^(org.kde.dolphin)$,title:^(Progress Dialog \u2014 Dolphin)$
windowrule=isfloating:1,appid:^(org.kde.dolphin)$,title:^(Copying \u2014 Dolphin)$

windowrule=isfloating:1,title:^(About Mozilla Firefox)$
windowrule=isfloating:1,appid:^(firefox)$,title:^(Picture-in-Picture)$
windowrule=isfloating:1,appid:^(firefox)$,title:^(Library)$

windowrule=isfloating:1,appid:^(kitty)$,title:^(top)$
windowrule=isfloating:1,appid:^(kitty)$,title:^(btop)$
windowrule=isfloating:1,appid:^(kitty)$,title:^(htop)$

windowrule=isfloating:1,appid:^(vlc)$
windowrule=isfloating:1,appid:^(mpv)$
windowrule=isfloating:1,appid:^(kvantummanager)$
windowrule=isfloating:1,appid:^(qt5ct)$
windowrule=isfloating:1,appid:^(qt6ct)$
windowrule=isfloating:1,appid:^(nwg-look)$
windowrule=isfloating:1,appid:^(org.kde.ark)$
windowrule=isfloating:1,appid:^(org.pulseaudio.pavucontrol)$
